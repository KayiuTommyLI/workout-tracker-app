<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="AI-powered workout tracker with personalized recommendations">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Workout Tracker">
    
    <title>Workout Tracker - AI Powered Fitness</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>💪 Workout Tracker</h1>
            <button id="install-btn" class="install-btn" style="display: none;">
                📱 Install App
            </button>
        </header>
        
        <main class="container">
            <div id="equipment-container"></div>
            <div id="workout-form"></div>
            <div id="workout-log"></div>
            <div id="recommendations"></div>
            <div id="analytics-container"></div>
        </main>
        
        <footer>
            <p>© 2025 Workout Tracker | Powered by AI</p>
        </footer>
    </div>
    
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/pwa.js"></script>
</body>
</html>
